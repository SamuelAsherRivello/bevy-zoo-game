name: ReleaseWebBuildToGithubPages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional release folder name. Leave blank to use VERSION.txt.
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build release web app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_version || github.ref }}

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          release_version="${{ github.event.release.tag_name || inputs.release_version }}"
          if [ -z "${release_version}" ]; then
            if [ ! -f VERSION.txt ]; then
              echo "::error::Release version was blank and VERSION.txt does not exist."
              exit 1
            fi
            version="$(tr -d '[:space:]' < VERSION.txt)"
            release_version="v${version}"
          fi
          if ! [[ "${release_version}" =~ ^v0[.][0-9]{2}$ ]]; then
            echo "::error::Release version must look like v0.01."
            exit 1
          fi
          echo "RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"

      - name: Check GitHub Pages setup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if build_type="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.build_type' 2>/dev/null)"; then
            if [ "${build_type}" != "workflow" ]; then
              if [ -n "${PAGES_ADMIN_TOKEN}" ]; then
                GH_TOKEN="${PAGES_ADMIN_TOKEN}" gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow >/dev/null
              else
                echo "::error::GitHub Pages is enabled, but Source is not set to GitHub Actions. Open Settings > Pages and set Source to GitHub Actions, or add a PAGES_ADMIN_TOKEN secret with Pages write permission so this workflow can configure it."
                exit 1
              fi
            fi
            echo "PAGES_ENABLED=true" >> "${GITHUB_ENV}"
          elif [ -n "${PAGES_ADMIN_TOKEN}" ]; then
            echo "PAGES_ENABLED=false" >> "${GITHUB_ENV}"
          else
            echo "::error::GitHub Pages is not enabled. Enable it in Settings > Pages with Source set to GitHub Actions, or add a PAGES_ADMIN_TOKEN secret with Pages write permission so this workflow can enable it."
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: ${{ env.PAGES_ENABLED == 'false' }}
          token: ${{ secrets.PAGES_ADMIN_TOKEN || github.token }}

      - name: Prepare release storage branch
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p pages-store
          git -C pages-store init
          git -C pages-store remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git -C pages-store fetch --depth=1 origin pages-releases; then
            git -C pages-store checkout pages-releases
          else
            git -C pages-store checkout --orphan pages-releases
            git -C pages-store rm -rf . || true
          fi
          touch pages-store/.nojekyll
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config \
            wayland-protocols

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.121 --locked

      - name: Export web bundle
        shell: pwsh
        run: ./scripts/other/RunAppWeb.ps1 -Release -NoOpen -ExportOnly

      - name: Validate web bundle
        shell: bash
        run: |
          set -euxo pipefail
          cp target/run-app-web/site/index.html target/run-app-web/site/404.html
          grep -q "Bevy Zoo Game" target/run-app-web/site/index.html
          find target/run-app-web/site -maxdepth 1 -name 'bevy_zoo_game_bg.wasm' -print -quit | grep -q .

      - name: Copy versioned release
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf "pages-store/releases/${RELEASE_VERSION}"
          mkdir -p "pages-store/releases/${RELEASE_VERSION}"
          cp -a target/run-app-web/site/. "pages-store/releases/${RELEASE_VERSION}/"

      - name: Copy latest release
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf pages-store/latest
          mkdir -p pages-store/latest
          cp -a target/run-app-web/site/. pages-store/latest/

      - name: Add root redirect
        shell: bash
        run: |
          set -euxo pipefail
          cat > pages-store/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./latest/">
              <title>Bevy Zoo Game</title>
            </head>
            <body>
              <a href="./latest/">Open latest release</a>
            </body>
          </html>
          HTML

      - name: Commit release storage branch
        shell: bash
        run: |
          set -euxo pipefail
          git -C pages-store config user.name "github-actions[bot]"
          git -C pages-store config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C pages-store add .
          if git -C pages-store diff --cached --quiet; then
            echo "No Pages release storage changes to commit."
          else
            git -C pages-store commit -m "Publish ${RELEASE_VERSION} web release"
            git -C pages-store push origin pages-releases
          fi

      - name: Remove Pages storage git metadata
        shell: bash
        run: rm -rf pages-store/.git

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-store

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
